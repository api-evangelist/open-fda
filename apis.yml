    humanURL: https://open.fda.gov/apis/drug/event/
    baseURL: https://api.fda.gov
    tags:
      - Drug Safety
      - Adverse Events
      - FAERS
    properties:
      - type: Documentation
        url: https://open.fda.gov/apis/drug/event/
  - aid: open-fda:drug-labeling
    name: Drug Labeling API
